<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="author" content="Neha Gurjar" />
    <title>Neha Gurjar — Data Analyst Portfolio</title>
    <meta
      name="description"
      content="Aspiring Data Analyst specializing in Power BI, SQL, Tableau & Python. Explore 9 end-to-end analytics missions transforming raw data into decisions."
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="Neha Gurjar — Data Analyst Portfolio"
    />
    <meta
      property="og:description"
      content="Power BI · SQL · Tableau · Python — 9 dashboards across operations, sales, healthcare, retail and automotive."
    />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      // Find the main JS bundle dynamically
      const scripts = Array.from(document.querySelectorAll('script'));
      let mainScript = scripts.find((s) =>
        s.src.includes('index-') && s.src.endsWith('.js')
      );

      if (!mainScript) {
        // Fallback: load from assets folder
        const assets = Object.keys(window.__ASSETS__ || {});
        const mainAsset = assets.find(
          (a) => a.includes('index-') && a.endsWith('.js')
        );
        if (mainAsset) {
          const script = document.createElement('script');
          script.type = 'module';
          script.src = `/assets/${mainAsset}`;
          document.body.appendChild(script);
        }
      }
    </script>
  </body>
</html>
